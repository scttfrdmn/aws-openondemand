name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init (no backend)
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate

  cdk:
    name: CDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cdk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: cdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (type check)
        run: npm run build

      - name: Lint
        run: npm run lint

  packer:
    name: Packer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-packer@v3 # Pinned to stable release tag (H1)
        with:
          version: "1.11.2" # Pin to specific version for reproducible AMI builds

      - name: Init Packer plugins
        run: packer init packer/ood.pkr.hcl

      - name: Validate Packer template
        run: packer validate packer/ood.pkr.hcl

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: tfsec (Terraform static analysis)
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: terraform
          soft_fail: false

      - name: checkov (IaC policy scan)
        uses: bridgecrewio/checkov-action@3b5b35d8b7e52f27bc58d05e3b56e55a9e5e3ec7 # M1: pinned v3.2.2 — @master is mutable
        with:
          directory: terraform
          framework: terraform
          soft_fail: false
          # Suppressions are documented in .checkov.yaml at repo root (H6)
          config_file: .checkov.yaml

      - name: trivy (secret scan)
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8 # M1: pinned v0.28.0 — @master is mutable
        with:
          scan-type: fs
          scan-ref: "."
          scanners: secret
          exit-code: "1"
          severity: HIGH,CRITICAL
