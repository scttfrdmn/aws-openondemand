name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # L1: actions/checkout@v6.0.2

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # L1: setup-terraform@v4.0.0

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init (no backend)
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate

  cdk:
    name: CDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cdk
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # L1: actions/checkout@v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # L1: setup-node@v6.3.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: cdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (type check)
        run: npm run build

      - name: Lint
        run: npm run lint

  packer:
    name: Packer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # L1: actions/checkout@v6.0.2

      - uses: hashicorp/setup-packer@c3d53c525d422944e50ee27b840746d6522b08de # L1: setup-packer@v3.2.0
        with:
          version: "1.11.2" # Pin to specific version for reproducible AMI builds

      - name: Init Packer plugins
        run: packer init packer/ood.pkr.hcl

      - name: Validate Packer template
        run: packer validate packer/ood.pkr.hcl

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # L1: actions/checkout@v6.0.2

      # H5: CKV_AWS_79 (IMDSv2) is suppressed in .checkov.yaml because checkov cannot detect
      # metadata_options inside a dynamic block. This grep step ensures the suppression is
      # valid — if http_tokens="required" is removed, this step fails and blocks the PR.
      - name: Verify IMDSv2 enforcement (CKV_AWS_79 suppression guard)
        run: |
          grep -q 'http_tokens.*=.*"required"' terraform/main.tf || {
            echo "ERROR: IMDSv2 enforcement (http_tokens = \"required\") not found in terraform/main.tf"
            echo "       CKV_AWS_79 is suppressed in .checkov.yaml assuming this control is present."
            echo "       Either restore the metadata_options block or remove the suppression."
            exit 1
          }

      - name: tfsec (Terraform static analysis)
        uses: aquasecurity/tfsec-action@b466648d6e39e7c75324f25d83891162a721f2d6 # L1: tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: false

      - name: checkov (IaC policy scan)
        uses: bridgecrewio/checkov-action@3b5b35d8b7e52f27bc58d05e3b56e55a9e5e3ec7 # M1: pinned v3.2.2 — @master is mutable
        with:
          directory: terraform
          framework: terraform
          soft_fail: false
          # Suppressions are documented in .checkov.yaml at repo root (H6)
          config_file: .checkov.yaml

      - name: trivy (secret scan)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # M1: pinned v0.28.0 — @master is mutable
        with:
          scan-type: fs
          scan-ref: "."
          scanners: secret
          exit-code: "1"
          severity: HIGH,CRITICAL
